<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Echoseo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="dashboard">
    <header class="topbar">
      <div class="logo-wrap">
        <span class="logo-line"></span>
        <h1 class="logo">Echoseo</h1>
      </div>
    </header>

    <section class="layout">
      <div class="left-column">
        <form class="search-bar" id="searchForm">
          <input
            type="text"
            id="searchInput"
            placeholder="search bar"
            aria-label="Search"
          />
        </form>

        <section class="card large-card" id="hitsCard">
          <h2>search hits</h2>
          <div id="hitsContent" class="card-content"></div>
        </section>
      </div>

      <div class="right-column">
        <div class="score-card">
          <span>Score</span>
          <strong id="scoreValue">--</strong>
        </div>

        <section class="card summary-card">
          <h2>summary &<br />suggestions</h2>
          <div id="summaryContent" class="card-content"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
