<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Echoseo</title>
</head>
<body>
  <main class="dashboard">

    <header class="topbar">
      <div class="logo-wrap">
        <span class="logo-line"></span>
        <h1 class="logo">Echoseo</h1>
      </div>
    </header>

    <section class="layout">

      <!-- LEFT COLUMN -->
      <div class="left-column">

        <form class="search-bar" id="searchForm">
          <input
            id="searchInput"
            type="text"
            placeholder="search bar"
            aria-label="Search"
          />
        </form>

        <section class="card hits-card">
          <div class="card-heading">
            <h2>search hits</h2>
          </div>
          <div id="hitsContent" class="hits-content empty-state">
            Search for a username, email or handle to view indexed results.
          </div>
        </section>

      </div>

      <!-- RIGHT COLUMN -->
      <div class="right-column">

        <div class="score-card">
          <span>Score</span>
          <strong id="scoreValue">--</strong>
        </div>

        <section class="card summary-card">
          <div class="card-heading">
            <h2>summary &amp; suggestions</h2>
          </div>
          <div id="summaryContent" class="summary-content empty-state">
            A short summary and guidance will appear here.
          </div>
        </section>

      </div>

    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
